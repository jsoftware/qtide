name: Jinstall

on:
 push:
  branches:
   - master
   - main

jobs:

# to run all jobs, enable all
# for selected jobs, disable all and disable the selected needs

 all:
  #if: false
  if: true
  runs-on: ubuntu-latest
  steps:
    - run: echo "Runall jobs"

# linux ----------------------------------------------------------------
 jqtlinux:
  needs: all
  name: Jinstall (Linux)
  runs-on: ubuntu-22.04
  steps:
   - name: Check Git repository
     uses: actions/checkout@v6
     with:
      submodules: recursive

   - name: Test Jinstall
     run: |
      script/installxcb.sh linux x64
      script/testinstall.sh linux x64

# macOS ----------------------------------------------------------------
 jqtmacos:
  needs: all
  name: Jinstall (macOS)
  runs-on: macos-15-intel
  steps:
   - name: Check Git repository
     uses: actions/checkout@v6
     with:
      submodules: recursive

   - name: Test Jinstall
     env:
      CC: clang
     run: script/testinstall.sh darwin x64

# rpi64arm -------------------------------------------------------------
 jqtrpi64arm:
  needs: all
  name: Jinstall (Linux arm)
  runs-on: ubuntu-24.04-arm
  steps:
   - name: Check Git repository
     uses: actions/checkout@v6
     with:
      submodules: recursive

   - name: Test Jinstall
     run: |
      script/installxcb.sh raspberry arm64
      script/testinstall.sh raspberry arm64

# rpi64arm -------------------------------------------------------------
 jqtrpi64arm5:
  needs: all
  name: Jinstall (Linux arm)
  if: ${{ false }}
  runs-on: ubuntu-24.04-arm
  steps:
   - name: Check Git repository
     uses: actions/checkout@v6
     with:
      submodules: recursive

   - name: Install Qt from distro
     run: script/installqt.sh raspberry arm64 '5.15.2'

   - name: Test Jinstall
     run: script/testinstall.sh raspberry arm64 '5.15.2'   # previous 5.15.2
#     run: QM=${{github.workspace}}/Qt/5.15.2/gcc_64/bin/qmake script/testinstall.sh raspberry arm64 '5.15.2'

# rpi64 ----------------------------------------------------------------
 jqtrpi64:
  needs: all
  name: Jinstall (Raspberry)
  if: ${{ false }}
  runs-on: ubuntu-latest
  steps:
   - name: Check Git repository
     uses: actions/checkout@v6
     with:
      submodules: recursive

   - name: Install Qt, Test Jinstall
     uses: pguyot/arm-runner-action@v2
     with:
      cpu: cortex-a53
      cpu_info: cpuinfo/raspberrypi_zero2_w_arm64
      base_image: raspios_lite_arm64:latest
      image_additional_mb: 2048
      copy_artifact_path: output
      commands: |
       script/installqt.sh raspberry arm64 '5.15.2'
       export CC=clang
       mkdir -p output
       script/testinstall.sh raspberry arm64 '5.15.2'
       find output -type d -exec chmod a+rwx {} \;
       find output -type f -exec chmod a+rw {} \;

# rpi32arm -------------------------------------------------------------
 jqtrpi32arm:
  needs: all
  name: Jinstall (Linux arm32)
  if: ${{ false }}
  runs-on: ubuntu-24.04-arm
  steps:
   - name: Check Git repository
     uses: actions/checkout@v6

   - name: Setup Environment (Linux arm)
     run: |
      script/install-rpi.sh
      sudo apt-get update -y
      sudo apt-cache search qt5 1>&2
      sudo apt-cache search qt6 1>&2

   - name: Install Qt from distro
     run: script/installqt.sh raspberry armv6l '6.10.3'

   - name: Test Jinstall
     env:
      CC: arm-linux-gnueabihf-gcc
      CXX: arm-linux-gnueabihf-g++
     run: script/testinstall.sh raspberry armv6l '6.10.3'   # previous 5.15.2

# rpi32 ----------------------------------------------------------------
 jqtrpi32:
  needs: all
  name: Jinstall (Raspberry-arm32)
  if: ${{ false }}
  runs-on: ubuntu-latest
  steps:
   - name: Check Git repository
     uses: actions/checkout@v6

   - name: Install Qt, Test Jinstall
     uses: pguyot/arm-runner-action@v2
     with:
      cpu: arm1176
      cpu_info: cpuinfo/raspberrypi_zero2_w
      base_image: raspios_lite:latest
      image_additional_mb: 2048
      copy_artifact_path: output
      commands: |
       export CC=gcc
       sudo apt-get update -y
       sudo apt-cache search qt5 1>&2
       sudo apt-cache search qt6 1>&2
       script/installqt.sh raspberry armv6l '5.15.2'
       script/testinstall.sh raspberry armv6l '5.15.2'
       find output -type d -exec chmod a+rwx {} \;
       find output -type f -exec chmod a+rw {} \;

# openbsd --------------------------------------------------------------
 jqtopenbsd:
  needs: all
  name: Jinstall (OpenBSD cross-platform-actions)
  runs-on: ubuntu-latest
  steps:
   - name: Checkout Git repository
     uses: actions/checkout@v6

   - name: Install Qt, Test Jinstall
     uses: cross-platform-actions/action@v0.27.0
     with:
      operating_system: openbsd
      architecture: x86-64
      version: '7.6'
      shell: bash

      run: |
       rm -f jobdone
       export IGNORE_OSVERSION=yes
       sudo pkg_add -u
       sudo pkg_info -Q qt6
       sudo pkg_add curl zip gmake
       sudo rdate time.cloudflare.com || true
       export CC=clang
       script/installqt.sh openbsd x64 '6.6.3' || exit 1
       script/testinstall.sh openbsd x64 '6.6.3' || exit 1
       touch jobdone

   - name: Check Status
     run: |
      test -f jobdone || exit 1

# freebsd --------------------------------------------------------------
 jqtfreebsd:
  needs: all
  name: Jinstall (FreeBSD vmactions)
  if: ${{ false }}
  runs-on: ubuntu-latest
  steps:
   - name: Checkout Git repository
     uses: actions/checkout@v6
     with:
      submodules: recursive

   - name: Install Qt, Test Jinstall
     uses: vmactions/freebsd-vm@v0
     with:
      usesh: true
      sync: sshfs
      prepare: |
       rdate time.cloudflare.com || true
       pkg install -y curl zip gmake sudo

      run: |
       rm -f jobdone
       export IGNORE_OSVERSION=yes
       pkg search 'qt6*' 1>&2
       pkg install -y curl zip gmake
       rdate time.cloudflare.com || true
       export CC=clang
       script/installqt.sh freebsd x64 '5.15.2' || exit 1
       script/testinstall.sh freebsd x64 '5.15.2' || exit 1
       touch jobdone

   - name: Check Status
     run: |
      test -f jobdone || exit 1

# freebsd --------------------------------------------------------------
 jqtfreebsd2:
  needs: all
  name: Jinstall (FreeBSD cross-platform-actions)
  runs-on: ubuntu-latest
  steps:
   - name: Checkout Git repository
     uses: actions/checkout@v6

   - name: Install Qt, Test Jinstall
     uses: cross-platform-actions/action@v0.27.0
     with:
      operating_system: freebsd
      architecture: x86-64
      version: '14.2'
      shell: bash

      run: |
       rm -f jobdone
       export IGNORE_OSVERSION=yes
       sudo pkg upgrade -y
       sudo pkg search 'qt6*' 1>&2
       sudo pkg install -y curl zip gmake
       sudo rdate time.cloudflare.com || true
       export CC=clang
       script/installqt.sh freebsd x64 '6.9.3' || exit 1
       script/testinstall.sh freebsd x64 '6.9.3' || exit 1
       touch jobdone

   - name: Check Status
     run: |
      test -f jobdone || exit 1

